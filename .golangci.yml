version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - errcheck
    - goconst
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    goconst:
      min-len: 5
      min-occurrences: 4
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - test/.*
      - test/.*/.*
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - test/.*
      - test/.*/.*
      - third_party$
      - builtin$
      - examples$
